name: Node.js CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npm test
      - run: npm run sync:squirrelsong
      - run: npm run build:sapegin
      - run: npm run build:morning
      - run: npm run build:tacohuaco
